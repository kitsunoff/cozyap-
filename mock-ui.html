<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cozystack User Apps — UI Mock</title>
<link href="https://unpkg.com/antd@5/dist/reset.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/antd@5/dist/antd.min.js"></script>
<style>
  * { box-sizing: border-box; }

  :root {
    --bg-app:         #1a1a1e;
    --bg-sidebar:     #16161a;
    --bg-surface:     #222226;
    --bg-elevated:    #2a2a2e;
    --bg-hover:       #2e2e34;
    --text-primary:   #e8e8ea;
    --text-secondary: #9999a8;
    --text-muted:     #666672;
    --border:         rgba(255,255,255,0.08);
    --border-hover:   rgba(255,255,255,0.14);
    --accent-blue:    #4c7ef3;
    --accent-green:   #3ecf8e;
    --accent-amber:   #f5a623;
    --accent-red:     #f87171;
    --accent-purple:  #a78bfa;
  }

  body {
    margin: 0;
    background: #0f0f12;
    font-family: -apple-system, system-ui, sans-serif;
    color: var(--text-primary);
  }

  /* ─── Screen divider ─── */
  .screen-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 48px 40px 32px;
    background: #0f0f12;
  }
  .screen-divider-line {
    flex: 1;
    height: 0.5px;
    background: rgba(255,255,255,0.08);
  }
  .screen-divider-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    white-space: nowrap;
    background: #0f0f12;
    padding: 0 8px;
  }

  /* ─── Shell ─── */
  .shell {
    display: flex;
    flex-direction: column;
    height: 780px;
    border-radius: 12px;
    overflow: hidden;
    border: 0.5px solid var(--border);
    margin: 0 40px 0;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  }

  /* ─── Topbar ─── */
  .topbar {
    height: 48px;
    background: var(--bg-sidebar);
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 0;
    flex-shrink: 0;
    z-index: 10;
  }
  .topbar-logo {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-primary);
    margin-right: 24px;
    white-space: nowrap;
  }
  .topbar-env-select {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: var(--bg-elevated);
    border: 0.5px solid var(--border-hover);
    border-radius: 6px;
    font-size: 12px;
    color: var(--text-primary);
    cursor: pointer;
  }
  .topbar-env-select svg { color: var(--text-muted); }
  .topbar-spacer { flex: 1; }
  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .topbar-icon-btn {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 14px;
    transition: background 0.15s;
  }
  .topbar-icon-btn:hover { background: var(--bg-hover); }
  .topbar-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4c7ef3, #a78bfa);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    color: white;
    margin-left: 4px;
    cursor: pointer;
  }

  /* ─── Body ─── */
  .body-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ─── Sidebar ─── */
  .sidebar {
    width: 176px;
    background: var(--bg-sidebar);
    border-right: 0.5px solid var(--border);
    padding: 16px 0;
    flex-shrink: 0;
    overflow-y: auto;
  }
  .sidebar-section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 12px 16px 6px;
  }
  .sidebar-section-label:first-child { padding-top: 4px; }
  .sidebar-item {
    display: flex;
    align-items: center;
    height: 32px;
    padding: 0 16px;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    border-radius: 0;
    user-select: none;
  }
  .sidebar-item:hover {
    background: var(--bg-hover);
    color: var(--text-primary);
  }
  .sidebar-item.active {
    background: var(--bg-elevated);
    color: var(--text-primary);
    font-weight: 500;
  }
  .sidebar-item.sub {
    padding-left: 28px;
    font-size: 12px;
  }

  /* ─── Content ─── */
  .content {
    flex: 1;
    background: var(--bg-app);
    overflow-y: auto;
    padding: 24px 28px;
  }

  /* ─── Page header ─── */
  .page-breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }
  .page-breadcrumb a { color: var(--text-secondary); cursor: pointer; }
  .page-breadcrumb a:hover { color: var(--text-primary); }
  .page-breadcrumb .sep { color: var(--text-muted); }

  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .page-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
  }

  /* ─── Status badges ─── */
  .badge {
    display: inline-flex;
    align-items: center;
    height: 22px;
    padding: 0 8px;
    border-radius: 5px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }
  .badge-running    { background: rgba(62,207,142,0.15);  color: #3ecf8e; }
  .badge-installing { background: rgba(76,126,243,0.15);  color: #4c7ef3; }
  .badge-upgrading  { background: rgba(76,126,243,0.15);  color: #4c7ef3; }
  .badge-starting   { background: rgba(245,166,35,0.15);  color: #f5a623; }
  .badge-stopped    { background: rgba(255,255,255,0.06); color: #9999a8; }
  .badge-failed     { background: rgba(248,113,113,0.15); color: #f87171; }
  .badge-removing   { background: rgba(248,113,113,0.15); color: #f87171; }
  .badge-ready      { background: rgba(62,207,142,0.15);  color: #3ecf8e; }
  .badge-provisioning { background: rgba(76,126,243,0.15); color: #4c7ef3; }
  .badge-degraded   { background: rgba(245,166,35,0.15);  color: #f5a623; }
  .badge-deleting   { background: rgba(248,113,113,0.15); color: #f87171; }

  /* ─── Category badges ─── */
  .cat-badge {
    display: inline-flex;
    align-items: center;
    height: 20px;
    padding: 0 7px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }
  .cat-cms     { background: rgba(52,130,246,0.15);  color: #6aaaf8; }
  .cat-nodejs  { background: rgba(62,207,142,0.15);  color: #5dd6a0; }
  .cat-php     { background: rgba(144,97,249,0.15);  color: #b08af9; }
  .cat-static  { background: rgba(245,166,35,0.15);  color: #f5c462; }
  .cat-game    { background: rgba(248,113,113,0.15); color: #f87171; }

  /* ─── Env pill ─── */
  .env-pill {
    display: inline-flex;
    align-items: center;
    height: 18px;
    padding: 0 7px;
    background: rgba(167,139,250,0.12);
    color: var(--accent-purple);
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }
  .env-pill.staging { background: rgba(245,166,35,0.1); color: #f5a623; }

  /* ─── App cards ─── */
  .app-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .app-card {
    background: var(--bg-surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .app-card:hover { border-color: var(--border-hover); }
  .app-card-row1 {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .app-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .app-name {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
  }
  .app-card-row2 {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .app-card-row2 .type-label {
    font-size: 12px;
    color: var(--text-muted);
  }
  .app-card-row2 .domain-link {
    font-size: 12px;
    color: var(--accent-blue);
    cursor: pointer;
  }
  .app-card-row2 .domain-link:hover { text-decoration: underline; }
  .app-card-row3 {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .app-card-row3 .launch-time {
    font-size: 12px;
    color: var(--text-muted);
    flex: 1;
  }
  .app-card-btns { display: flex; gap: 6px; margin-left: auto; }

  /* ─── Buttons ─── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    height: 28px;
    padding: 0 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, background 0.15s;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent-blue);
    color: white;
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-default {
    background: transparent;
    border: 0.5px solid var(--border-hover);
    color: var(--text-primary);
  }
  .btn-default:hover { background: var(--bg-hover); }
  .btn-danger {
    background: transparent;
    border: 0.5px solid rgba(248,113,113,0.3);
    color: var(--accent-red);
  }
  .btn-danger:hover { background: rgba(248,113,113,0.08); }
  .btn-icon {
    background: transparent;
    border: 0.5px solid var(--border-hover);
    color: var(--text-muted);
    padding: 0 8px;
    width: 28px;
  }
  .btn-icon:hover { background: var(--bg-hover); color: var(--text-primary); }
  .btn-lg {
    height: 34px;
    padding: 0 16px;
    font-size: 13px;
  }

  /* ─── Summary line ─── */
  .summary-line {
    font-size: 12px;
    color: var(--text-muted);
    padding-top: 4px;
  }

  /* ─── Card sections (Details page) ─── */
  .section-card {
    background: var(--bg-surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .section-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 0.5px solid var(--border);
  }
  .section-card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .desc-table { width: 100%; }
  .desc-row {
    display: flex;
    border-bottom: 0.5px solid var(--border);
  }
  .desc-row:last-child { border-bottom: none; }
  .desc-label {
    width: 160px;
    padding: 10px 18px;
    font-size: 12px;
    color: var(--text-muted);
    flex-shrink: 0;
    background: rgba(255,255,255,0.02);
  }
  .desc-value {
    padding: 10px 18px;
    font-size: 13px;
    color: var(--text-primary);
    flex: 1;
  }
  .desc-value a { color: var(--accent-blue); cursor: pointer; }
  .desc-value a:hover { text-decoration: underline; }

  /* ─── Modal overlay ─── */
  .modal-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    border-radius: 12px;
  }
  .modal-box {
    background: var(--bg-surface);
    border: 0.5px solid var(--border-hover);
    border-radius: 12px;
    width: 440px;
    overflow: hidden;
  }
  .modal-header {
    padding: 18px 22px;
    border-bottom: 0.5px solid var(--border);
  }
  .modal-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 2px;
  }
  .modal-subtitle {
    font-size: 12px;
    color: var(--text-muted);
  }
  .modal-body { padding: 22px; }
  .modal-footer {
    padding: 14px 22px;
    border-top: 0.5px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  /* ─── Form elements ─── */
  .form-group { margin-bottom: 18px; }
  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .form-label .required { color: var(--accent-red); margin-left: 2px; }
  .form-label .lock-icon { opacity: 0.35; margin-left: 4px; }
  .form-input {
    width: 100%;
    height: 34px;
    background: var(--bg-elevated);
    border: 0.5px solid var(--border-hover);
    border-radius: 6px;
    padding: 0 10px;
    font-size: 13px;
    color: var(--text-primary);
    outline: none;
    font-family: inherit;
    transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--accent-blue); }
  .form-input::placeholder { color: var(--text-muted); }
  .form-select {
    width: 100%;
    height: 34px;
    background: var(--bg-elevated);
    border: 0.5px solid var(--border-hover);
    border-radius: 6px;
    padding: 0 10px;
    font-size: 13px;
    color: var(--text-primary);
    outline: none;
    font-family: inherit;
    appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23666672' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 10px center;
  }
  .form-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 5px;
  }
  .form-input-wrap {
    position: relative;
  }
  .form-input-wrap .eye-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
  }
  .form-section-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
    margin: 22px 0 14px;
    padding-bottom: 8px;
    border-bottom: 0.5px solid var(--border);
  }
  .form-section-title:first-child { margin-top: 0; }

  /* Toggle */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 2px 0;
  }
  .toggle-label-wrap { flex: 1; }
  .toggle-label-text {
    font-size: 13px;
    color: var(--text-primary);
  }
  .toggle {
    width: 32px;
    height: 18px;
    border-radius: 9px;
    background: var(--bg-hover);
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--accent-blue); }
  .toggle-knob {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: white;
    position: absolute;
    top: 2px;
    left: 2px;
    transition: left 0.2s;
  }
  .toggle.on .toggle-knob { left: 16px; }

  /* ─── Info box ─── */
  .info-box {
    background: var(--bg-elevated);
    border-left: 3px solid var(--accent-blue);
    border-radius: 0 6px 6px 0;
    padding: 12px 14px;
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 16px;
  }

  /* ─── App Store grid ─── */
  .store-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .search-input {
    flex: 1;
    max-width: 280px;
    height: 32px;
    background: var(--bg-elevated);
    border: 0.5px solid var(--border-hover);
    border-radius: 6px;
    padding: 0 10px 0 32px;
    font-size: 13px;
    color: var(--text-primary);
    outline: none;
    font-family: inherit;
    background-image: url("data:image/svg+xml,%3Csvg width='13' height='13' viewBox='0 0 13 13' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='5.5' cy='5.5' r='4.5' stroke='%23666672' stroke-width='1.2'/%3E%3Cpath d='M9 9L11.5 11.5' stroke='%23666672' stroke-width='1.2' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: 10px center;
  }
  .filter-btn {
    height: 28px;
    padding: 0 12px;
    border-radius: 5px;
    font-size: 12px;
    cursor: pointer;
    border: 0.5px solid transparent;
    background: transparent;
    color: var(--text-secondary);
    transition: all 0.12s;
  }
  .filter-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
  .filter-btn.active {
    background: rgba(76,126,243,0.15);
    color: var(--accent-blue);
    border-color: rgba(76,126,243,0.25);
  }
  .store-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }
  .store-card {
    background: var(--bg-surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.15s;
    display: flex;
    flex-direction: column;
  }
  .store-card:hover { border-color: var(--border-hover); }
  .store-card-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    margin-bottom: 10px;
  }
  .store-card-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 5px;
  }
  .store-card-cats {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
  }
  .store-card-desc {
    font-size: 12px;
    color: var(--text-secondary);
    flex: 1;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .store-card-footer {
    display: flex;
    justify-content: flex-end;
  }

  /* ─── Template page ─── */
  .template-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .template-header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .template-big-icon {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
  }
  .template-title-block .title-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .template-title-block h1 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
    margin: 0;
    line-height: 1.2;
  }
  .template-version {
    font-family: monospace;
    font-size: 11px;
    color: var(--text-muted);
  }
  .template-subtitle {
    font-size: 13px;
    color: var(--text-secondary);
    margin: 0;
  }
  .template-cols {
    display: grid;
    grid-template-columns: 60% 40%;
    gap: 20px;
  }
  .checklist { list-style: none; padding: 0; margin: 12px 0; }
  .checklist li {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-primary);
    padding: 5px 0;
  }
  .checklist li .check { color: var(--accent-green); font-size: 13px; }
  .actions-list { margin-top: 14px; }
  .action-row {
    display: flex;
    flex-direction: column;
    padding: 9px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .action-row:last-child { border-bottom: none; }
  .action-row .action-name {
    font-size: 13px;
    color: var(--text-primary);
    font-weight: 500;
    margin-bottom: 2px;
  }
